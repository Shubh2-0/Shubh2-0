name: 📝 Auto-Update Blog Card Grid in README

on:
  schedule:
    - cron: '0 2 * * *'   # Daily at 2:00 AM UTC (7:30 AM IST)
  workflow_dispatch:

jobs:
  update-blog-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Profile Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Fetch Latest Blog Posts & Update README Card Grid
        run: python scripts/update_blog_readme.py

      - name: Commit & Push if README Changed
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add README.md
          git diff --cached --quiet && echo "No changes." || \
            git commit -m "docs(auto): update blog card grid with latest posts [skip ci]" && \
            git push
